<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Inteligente FIX</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }
button { cursor:pointer; margin-top:5px; }
small { color:#555; }
</style>
</head>

<body>

<h1>🌱 Huerto Inteligente (ARREGLADO)</h1>

<div id="huerto"></div>

<script>

// 🌱 cultivos (ejemplo reducido pero funcional)
const plantas = [
{ id:1, nombre:"Maíz 🌽", dias:10, info:"Base alimenticia de México" },
{ id:2, nombre:"Frijol 🫘", dias:8, info:"Proteína vegetal esencial" },
{ id:3, nombre:"Jitomate 🍅", dias:25, info:"Base de salsas mexicanas" },
{ id:4, nombre:"Lechuga 🥬", dias:12, info:"Crecimiento rápido" },
{ id:5, nombre:"Zanahoria 🥕", dias:20, info:"Raíz comestible dulce" }
];

// ➕ AGREGAR (FIX: fecha siempre válida + id único)
function agregar(id){
    let h = JSON.parse(localStorage.getItem("huerto") || "[]");

    h.push({
        ...plantas.find(p => p.id === id),
        uid: crypto.randomUUID(), // ID seguro
        fecha: Date.now()
    });

    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🗑️ ELIMINAR (ahora usa uid, no fecha)
function eliminar(uid){
    if(!confirm("⚠️ ¿Eliminar este cultivo?")) return;

    let h = JSON.parse(localStorage.getItem("huerto") || "[]");
    h = h.filter(p => p.uid !== uid);

    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🌱 ETAPAS SEGURAS
function etapa(dias, total){
    if(!dias || !total) return "❓ Datos inválidos";

    let r = dias / total;

    if(r < 0.25) return "🌱 Semilla";
    if(r < 0.5) return "🌿 Brote";
    if(r < 0.8) return "🌾 Creciendo";
    if(r < 1) return "🌼 Casi listo";
    return "🍅 Listo para cosecha";
}

// 🌿 MOSTRAR HUERTO (con limpieza de datos corruptos)
function mostrarHuerto(){
    let d = document.getElementById("huerto");
    let h = JSON.parse(localStorage.getItem("huerto") || "[]");

    // 🧹 limpiar basura (evita NaN y undefined)
    h = h.filter(p =>
        p &&
        p.fecha &&
        p.dias &&
        p.uid &&
        p.nombre
    );

    localStorage.setItem("huerto", JSON.stringify(h));

    d.innerHTML = "";

    h.forEach(p => {

        let dias = Math.floor((Date.now() - p.fecha) / (1000*60*60*24));

        if(isNaN(dias)) dias = 0;

        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <small>${p.info}</small><br><br>

            📅 Plantado: ${new Date(p.fecha).toLocaleDateString()}<br>
            ⏳ Días: ${dias}<br>
            🌱 Estado: ${etapa(dias, p.dias)}<br>
            📆 Total: ${p.dias} días<br>

            <button onclick="eliminar('${p.uid}')">🗑️ Eliminar</button>
        </div>
        `;
    });
}

// iniciar limpio
window.onload = function(){
    mostrarHuerto();
}

</script>

</body>
</html>
