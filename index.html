<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Simulador MEGA PRO</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }

.seccion { background:white; margin:10px; padding:10px; border-radius:10px; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }

button { margin:5px; cursor:pointer; }

.bad { color:red; }
.dead { color:black; font-weight:bold; }

.bar { width:100%; height:10px; background:#ddd; border-radius:5px; }
.bar-fill { height:100%; background:green; }

.stat { font-weight:bold; }
</style>
</head>

<body>

<h1>🌱 Huerto Simulador MEGA PRO</h1>

<div class="seccion">
<h2>🌦️ Mundo</h2>
<p id="clima"></p>
<p id="estacion"></p>
<p class="stat">💰 Dinero: $<span id="dinero">0</span></p>
<p class="stat">⭐ Nivel agricultor: <span id="nivel">1</span></p>
<p class="stat">📊 XP: <span id="xp">0</span></p>
<p class="stat">🏆 Puntos: <span id="puntos">0</span></p>
</div>

<div class="seccion">
<h2>💧 Acciones</h2>
<button onclick="regar()">💧 Regar</button>
<button onclick="fertilizar()">🧬 Fertilizar</button>
</div>

<div class="seccion">
<h2>🌿 Huerto</h2>
<div id="huerto"></div>
</div>

<script>

// 🌱 PLANTAS
const plantas = [
{ id:1, nombre:"Maíz 🌽", valor:10 },
{ id:2, nombre:"Frijol 🫘", valor:8 },
{ id:3, nombre:"Jitomate 🍅", valor:15 },
{ id:4, nombre:"Lechuga 🥬", valor:6 }
];

// 🌍 ESTADO GLOBAL
let estado = {
    clima:"soleado ☀️",
    efecto:1.2,
    estacion:"verano ☀️",
    dinero:0,
    xp:0,
    nivel:1,
    puntos:0
};

// 💾 STORAGE
function getH(){ return JSON.parse(localStorage.getItem("huerto")||"[]"); }
function setH(h){ localStorage.setItem("huerto",JSON.stringify(h)); }

// 🌦️ CLIMA
function clima(){
    const tipos=[
        {t:"soleado ☀️",e:1.3},
        {t:"lluvioso 🌧️",e:1.5},
        {t:"seco 🔥",e:0.7},
        {t:"nublado ☁️",e:1.0}
    ];
    let c=tipos[Math.floor(Math.random()*tipos.length)];
    estado.clima=c.t;
    estado.efecto=c.e;
}

// 🍂 ESTACIONES
function estacion(){
    const e=["primavera 🌸","verano ☀️","otoño 🍂","invierno ❄️"];
    estado.estacion=e[Math.floor(Math.random()*e.length)];
}

// 🌱 PLANTAR
function plantar(id){
    let h=getH();
    h.push({...plantas.find(p=>p.id==id),crecimiento:0,plaga:false,muerto:false});
    setH(h);
    render();
}

// 💧 RIEGO
function regar(){
    let h=getH();
    h.forEach(p=>{ if(!p.muerto) p.crecimiento+=0.25; });
    setH(h);
}

// 🧬 FERTILIZAR
function fertilizar(){
    let h=getH();
    h.forEach(p=>{
        if(!p.muerto){
            p.crecimiento+=0.6;
            p.plaga=false;
        }
    });
    setH(h);
}

// 💀 PLAGAS
function plagas(){
    let h=getH();
    h.forEach(p=>{
        if(!p.muerto && Math.random()<0.2) p.plaga=true;
    });
    setH(h);
}

// 🌱 CRECIMIENTO + ECONOMÍA
function crecer(){
    let h=getH();

    h.forEach(p=>{
        if(p.muerto) return;

        let base=0.1*estado.efecto;

        if(p.plaga) p.crecimiento-=0.08;
        else p.crecimiento+=base;

        if(p.crecimiento<=0){
            p.muerto=true;
            estado.puntos+=1;
        }

        if(p.crecimiento>1.5){
            p.crecimiento=1.5;

            // 💰 COSECHA AUTOMÁTICA
            estado.dinero+=p.valor;
            estado.xp+=5;
            estado.puntos+=10;

            p.muerto=true;
        }
    });

    setH(h);
    levelUp();
}

// 📈 NIVEL
function levelUp(){
    if(estado.xp>=20){
        estado.nivel++;
        estado.xp=0;
    }
}

// 📊 BARRA
function bar(v){
    return `<div class="bar"><div class="bar-fill" style="width:${Math.min(v/1.5*100,100)}%"></div></div>`;
}

// 🌱 ETAPA
function etapa(v,m){
    if(m) return "💀 Muerta";
    if(v<0.3) return "🌱 Semilla";
    if(v<0.7) return "🌿 Brote";
    if(v<1.2) return "🌾 Creciendo";
    return "🍅 Lista";
}

// 🌿 RENDER
function render(){
    let div=document.getElementById("huerto");
    let h=getH();

    div.innerHTML="";

    h.forEach(p=>{
        div.innerHTML+=`
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p>${etapa(p.crecimiento,p.muerto)}</p>

            ${bar(p.crecimiento)}

            <p class="${p.plaga?'bad':''}">
                ${p.plaga?"💀 Plaga":"🌿 Saludable"}
            </p>

            <p>💰 valor: $${p.valor}</p>
        </div>
        `;
    });

    document.getElementById("clima").innerText=
    estado.clima;

    document.getElementById("estacion").innerText=
    "🍂 Estación: "+estado.estacion;

    document.getElementById("dinero").innerText=estado.dinero;
    document.getElementById("nivel").innerText=estado.nivel;
    document.getElementById("xp").innerText=estado.xp;
    document.getElementById("puntos").innerText=estado.puntos;
}

// 🔁 LOOP
setInterval(()=>{
    clima();
    estacion();
    crecer();
    plagas();
    render();
},3000);

window.onload=render;

</script>

</body>
</html>
