<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }

.seccion {
    background: white;
    padding: 10px;
    margin: 10px;
    border-radius: 10px;
}

.cultivo {
    border: 1px solid #ccc;
    padding: 10px;
    margin: 10px;
    background: white;
    border-radius: 10px;
}

button { margin-top: 5px; }

input {
    padding: 5px;
    margin: 5px;
}
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente</h1>

<div class="seccion">
<h2>Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">Catálogo de Cultivos</h2>

<input id="busqueda" placeholder="Buscar cultivo..." onkeyup="mostrarCatalogo()">

<div id="catalogo"></div>

<script>

const plantas = [ /* TU ARRAY COMPLETO AQUÍ (lo dejaste bien 👍) */ ];

// ================== CATÁLOGO ==================
function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    let filtro = document.getElementById("busqueda").value.toLowerCase();

    div.innerHTML = "";

    plantas
    .filter(p => p.nombre.toLowerCase().includes(filtro))
    .forEach((p, index) => {

        div.innerHTML += `
        <div class="cultivo">

            <h3>🌿 ${p.nombre}</h3>
            <p><b>Tipo:</b> ${p.tipo}</p>

            <p>💧 ${p.riego.frecuencia}</p>
            <p>🚿 ${p.riego.metodo}</p>

            <p>☀️ ${p.luz.horas}h (${p.luz.intensidad})</p>

            <p>🌱 Suelo: ${p.suelo.tipo} | pH ${p.suelo.ph}</p>

            <p>⏳ Germinación: ${p.germinacion.dias} días</p>

            <button onclick="agregar(${index})">
                Agregar al huerto
            </button>

        </div>
        `;
    });
}

// ================== AGREGAR ==================
function agregar(index){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    huerto.push({
        ...plantas[index],
        id: Date.now(),
        fecha: new Date().toLocaleDateString()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

// ================== HUERTO ==================
function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    div.innerHTML = "";

    huerto.forEach(p => {

        div.innerHTML += `
        <div class="cultivo">

            <h3>🌿 ${p.nombre}</h3>
            <p>${p.tipo}</p>

            <p>💧 ${p.riego.frecuencia}</p>
            <p>☀️ ${p.luz.horas}h</p>
            <p>🌱 ${p.suelo.tipo}</p>

            <p>📅 ${p.fecha}</p>

            <button onclick="eliminar(${p.id})">
                Eliminar
            </button>

        </div>
        `;
    });
}

// ================== ELIMINAR ==================
function eliminar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    huerto = huerto.filter(p => p.id !== id);

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

// ================== PERFIL ==================
function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "Hola " + nombre + " desde " + ubicacion;
}

// ================== INICIO ==================
window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();

    let nombre = localStorage.getItem("nombre");
    let ubicacion = localStorage.getItem("ubicacion");

    if(nombre){
        document.getElementById("saludo").innerText =
        "Hola " + nombre + " desde " + ubicacion;
    }
}

</script>

</body>
</html>
