<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Simulador PRO FIX</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }

.seccion { background:white; margin:10px; padding:10px; border-radius:10px; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }

button { margin:5px; cursor:pointer; }

.bad { color:red; }
.stat { font-weight:bold; }
.bar { width:100%; height:10px; background:#ddd; border-radius:5px; overflow:hidden; }
.bar-fill { height:100%; background:green; }
</style>
</head>

<body>

<h1>🌱 Huerto Simulador PRO (versión que sí funciona)</h1>

<div class="seccion">
<h2>🌦️ Clima</h2>
<p id="clima"></p>
</div>

<div class="seccion">
<h2>🌱 Plantar</h2>
<button onclick="plantar('Maíz 🌽')">Maíz</button>
<button onclick="plantar('Frijol 🫘')">Frijol</button>
<button onclick="plantar('Jitomate 🍅')">Jitomate</button>
<button onclick="plantar('Lechuga 🥬')">Lechuga</button>
</div>

<div class="seccion">
<h2>💧 Acciones</h2>
<button onclick="regar()">💧 Regar</button>
<button onclick="fertilizar()">🧬 Fertilizar</button>
</div>

<div class="seccion">
<h2>🌿 Huerto</h2>
<div id="huerto"></div>
</div>

<script>

let estado = {
    clima:"soleado ☀️",
    efecto:1.2
};

function getHuerto(){
    return JSON.parse(localStorage.getItem("huerto") || "[]");
}

function saveHuerto(h){
    localStorage.setItem("huerto", JSON.stringify(h));
}

function cambiarClima(){
    const tipos = [
        {t:"soleado ☀️", e:1.3},
        {t:"lluvioso 🌧️", e:1.5},
        {t:"nublado ☁️", e:1.0},
        {t:"seco 🔥", e:0.7}
    ];

    let c = tipos[Math.floor(Math.random()*tipos.length)];
    estado.clima = c.t;
    estado.efecto = c.e;

    document.getElementById("clima").innerText =
    estado.clima + " | crecimiento x" + estado.efecto;
}

// 🌱 PLANTAR
function plantar(nombre){
    let h = getHuerto();

    h.push({
        nombre,
        crecimiento:0,
        plaga:false,
        muerto:false
    });

    saveHuerto(h);
    render();
}

// 💧 RIEGO
function regar(){
    let h = getHuerto();

    h.forEach(p=>{
        if(!p.muerto) p.crecimiento += 0.25;
    });

    saveHuerto(h);
    render();
}

// 🧬 FERTILIZANTE
function fertilizar(){
    let h = getHuerto();

    h.forEach(p=>{
        if(!p.muerto){
            p.crecimiento += 0.6;
            p.plaga = false; // limpia plagas
        }
    });

    saveHuerto(h);
    render();
}

// 💀 PLAGAS
function plagas(){
    let h = getHuerto();

    h.forEach(p=>{
        if(!p.muerto && Math.random() < 0.2){
            p.plaga = true;
        }
    });

    saveHuerto(h);
}

// 🌱 CRECIMIENTO
function crecer(){
    let h = getHuerto();

    h.forEach(p=>{
        if(p.muerto) return;

        let base = 0.1 * estado.efecto;

        if(p.plaga){
            p.crecimiento -= 0.08;
        } else {
            p.crecimiento += base;
        }

        if(p.crecimiento <= 0){
            p.muerto = true;
            p.crecimiento = 0;
        }

        if(p.crecimiento > 1.5){
            p.crecimiento = 1.5;
        }
    });

    saveHuerto(h);
}

// 📊 BARRA
function bar(v){
    return `<div class="bar"><div class="bar-fill" style="width:${(v/1.5)*100}%"></div></div>`;
}

// 🌱 ETAPA
function etapa(v, m){
    if(m) return "💀 Muerta";
    if(v < 0.3) return "🌱 Semilla";
    if(v < 0.7) return "🌿 Brote";
    if(v < 1.2) return "🌾 Creciendo";
    return "🍅 Lista";
}

// 🌿 RENDER
function render(){
    let div = document.getElementById("huerto");
    let h = getHuerto();

    div.innerHTML = "";

    h.forEach(p=>{
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p>${etapa(p.crecimiento,p.muerto)}</p>

            ${bar(p.crecimiento)}

            <p class="${p.plaga?'bad':''}">
                ${p.plaga ? "💀 Plaga activa" : "🌿 Saludable"}
            </p>
        </div>
        `;
    });
}

// 🔁 LOOP CONTROLADO
setInterval(()=>{
    cambiarClima();
    crecer();
    plagas();
    render();
}, 4000);

// 🚀 INICIO
window.onload = function(){
    cambiarClima();
    render();
}

</script>

</body>
</html>
