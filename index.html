<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }
.seccion { background:white; padding:10px; margin:10px; border-radius:10px; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; }
button { margin-top:5px; cursor:pointer; }
input { padding:5px; margin:5px; }
</style>

</head>

<body>

<h1>🌱 Mi Huerto Inteligente</h1>

<div class="seccion">
<h2>Perfil 👤</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>Agregar planta ➕</h2>
<input id="newName" placeholder="Nombre planta">
<input id="newType" placeholder="Tipo">
<button onclick="agregarPlanta()">Agregar</button>
</div>

<div class="seccion">
<h2>Mi Huerto 🌿</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">Catálogo 📚</h2>
<input id="busqueda" placeholder="Buscar..." onkeyup="mostrarCatalogo()">
<div id="catalogo"></div>

<script>

let plantas = [
{ nombre:"Maíz 🌽", tipo:"Grano", riego:"2–3/semana", luz:"8–10h" },
{ nombre:"Frijol 🫘", tipo:"Grano", riego:"2/semana", luz:"6–8h" },
{ nombre:"Trigo 🌾", tipo:"Grano", riego:"1–2/semana", luz:"6–8h" },
{ nombre:"Arroz 🍚", tipo:"Grano", riego:"alto", luz:"6–8h" },
{ nombre:"Sorgo 🌾", tipo:"Grano", riego:"bajo", luz:"8–10h" },
{ nombre:"Aguacate 🥑", tipo:"Fruta", riego:"2–3/semana", luz:"6–8h" },
{ nombre:"Mango 🥭", tipo:"Fruta", riego:"moderado", luz:"8–10h" },
{ nombre:"Plátano 🍌", tipo:"Fruta", riego:"alto", luz:"5–8h" },
{ nombre:"Naranja 🍊", tipo:"Fruta", riego:"moderado", luz:"6–8h" },
{ nombre:"Limón 🍋", tipo:"Fruta", riego:"moderado", luz:"6–8h" },
{ nombre:"Papaya 🍈", tipo:"Fruta", riego:"medio", luz:"8–10h" },
{ nombre:"Sandía 🍉", tipo:"Fruta", riego:"medio", luz:"8–10h" },
{ nombre:"Guayaba 🍐", tipo:"Fruta", riego:"medio", luz:"6–8h" },
{ nombre:"Tuna 🌵", tipo:"Fruta", riego:"bajo", luz:"8–10h" },
{ nombre:"Pitaya 🌵", tipo:"Fruta", riego:"bajo", luz:"8–10h" },
{ nombre:"Zapote", tipo:"Fruta", riego:"medio", luz:"6–8h" },
{ nombre:"Mamey", tipo:"Fruta", riego:"medio", luz:"6–8h" },
{ nombre:"Chicozapote", tipo:"Fruta", riego:"medio", luz:"6–8h" },
{ nombre:"Guanábana", tipo:"Fruta", riego:"alto", luz:"5–7h" },
{ nombre:"Tejocote", tipo:"Fruta", riego:"medio", luz:"6–8h" },
{ nombre:"Xoconostle 🌵", tipo:"Fruta", riego:"muy bajo", luz:"8–10h" },

{ nombre:"Jitomate 🍅", tipo:"Verdura", riego:"3–4/semana", luz:"6–8h" },
{ nombre:"Lechuga 🥬", tipo:"Verdura", riego:"alto", luz:"4–6h" },
{ nombre:"Zanahoria 🥕", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Cebolla 🧅", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Chile 🌶️", tipo:"Verdura", riego:"medio", luz:"8–10h" },
{ nombre:"Calabaza 🎃", tipo:"Verdura", riego:"medio", luz:"8–10h" },
{ nombre:"Nopal 🌵", tipo:"Verdura", riego:"muy bajo", luz:"8–10h" },
{ nombre:"Espinaca 🥬", tipo:"Verdura", riego:"alto", luz:"4–6h" },
{ nombre:"Acelga 🥬", tipo:"Verdura", riego:"alto", luz:"5–7h" },
{ nombre:"Rábano 🔴", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Ejote 🫛", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Berro 🌿", tipo:"Verdura", riego:"alto", luz:"4–6h" },
{ nombre:"Col 🥬", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Brócoli 🥦", tipo:"Verdura", riego:"medio", luz:"6–8h" },
{ nombre:"Coliflor 🥦", tipo:"Verdura", riego:"medio", luz:"6–8h" },

{ nombre:"Perejil 🌿", tipo:"Hierba", riego:"medio", luz:"4–6h" },
{ nombre:"Cilantro 🌿", tipo:"Hierba", riego:"medio", luz:"4–6h" },

{ nombre:"Quelite 🌱", tipo:"Silvestre", riego:"bajo", luz:"6–8h" },

{ nombre:"Caña 🎋", tipo:"Industrial", riego:"alto", luz:"8–10h" },
{ nombre:"Algodón", tipo:"Fibra", riego:"medio", luz:"8–10h" },
{ nombre:"Café ☕", tipo:"Árbol", riego:"medio", luz:"4–6h" },
{ nombre:"Cacao 🍫", tipo:"Árbol", riego:"alto", luz:"4–6h" },

{ nombre:"Aloe Vera 🌿", tipo:"Medicinal", riego:"bajo", luz:"8–10h" },
{ nombre:"Alfalfa", tipo:"Forraje", riego:"medio", luz:"6–8h" },
{ nombre:"Agave 🌵", tipo:"Resistente", riego:"muy bajo", luz:"8–10h" },

{ nombre:"Chía", tipo:"Semilla", riego:"bajo", luz:"6–8h" },
{ nombre:"Amaranto", tipo:"Semilla", riego:"bajo", luz:"6–8h" },
{ nombre:"Cacahuate 🥜", tipo:"Semilla", riego:"medio", luz:"6–8h" },

{ nombre:"Haba 🫘", tipo:"Semilla", riego:"medio", luz:"6–8h" },
{ nombre:"Maíz azul 🌽", tipo:"Grano", riego:"medio", luz:"8–10h" },
{ nombre:"Huauzontle 🌿", tipo:"Semilla", riego:"bajo", luz:"6–8h" }
];

function render(){
  const cont = document.getElementById("catalogo");
  cont.innerHTML = "";
  plantas.forEach((p,i)=>{
    cont.innerHTML += `
      <div class="cultivo">
        <b>${p.nombre}</b><br>
        Tipo: ${p.tipo}<br>
        Riego: ${p.riego}<br>
        Luz: ${p.luz}<br>
        <button onclick="eliminar(${i})">Eliminar ❌</button>
      </div>
    `;
  });
}

function agregarPlanta(){
  const n = document.getElementById("newName").value;
  const t = document.getElementById("newType").value;
  if(!n) return;
  plantas.push({nombre:n+" 🌱", tipo:t, riego:"-", luz:"-"});
  render();
}

function eliminar(i){
  plantas.splice(i,1);
  render();
}

function guardarPerfil(){
  const n=document.getElementById("nombre").value;
  const u=document.getElementById("ubicacion").value;
  document.getElementById("saludo").innerText =
  `Hola ${n}, huerto listo en ${u} 🌱`;
}

function mostrarCatalogo(){
  const txt=document.getElementById("busqueda").value.toLowerCase();
  const cont=document.getElementById("huerto");
  cont.innerHTML="";
  plantas.filter(p=>p.nombre.toLowerCase().includes(txt))
  .forEach(p=>{
    cont.innerHTML += `<div class="cultivo">${p.nombre}</div>`;
  });
}

render();

</script>

</body>
</html>
