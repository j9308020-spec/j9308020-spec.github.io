<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Completo Restaurado</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }

.cultivo {
  border:1px solid #ccc;
  padding:10px;
  margin:10px;
  background:white;
}

small { color:#555; display:block; margin-top:5px; }

button { margin-top:5px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 Huerto Inteligente Completo (RESTAURADO)</h1>

<h2>📚 Catálogo de Cultivos</h2>
<div id="catalogo"></div>

<hr>

<h2>🌿 Mi Huerto</h2>
<div id="huerto"></div>

<script>

/* =========================
   🌱 CULTIVOS RESTAURADOS
   ========================= */

const plantas = [
{ id:1, nombre:"Maíz 🌽", dias:10, agua:"25–40 mm/sem", sol:"6–8h", suelo:"Fértil profundo", fert:"Alto nitrógeno", info:"Base alimenticia de México" },
{ id:2, nombre:"Frijol 🫘", dias:8, agua:"20–30 mm/sem", sol:"6h", suelo:"Suelto", fert:"Medio", info:"Fija nitrógeno al suelo" },
{ id:3, nombre:"Trigo 🌾", dias:10, agua:"Moderado", sol:"6h", suelo:"Fértil", fert:"Medio", info:"Base de harina" },
{ id:4, nombre:"Arroz 🍚", dias:14, agua:"Inundado", sol:"6–8h", suelo:"Inundado", fert:"Alto", info:"Cultivo de agua" },
{ id:5, nombre:"Sorgo 🌾", dias:9, agua:"Bajo", sol:"Sol fuerte", suelo:"Resistente", fert:"Medio", info:"Resistente a sequía" },

{ id:6, nombre:"Aguacate 🥑", dias:45, agua:"Moderado", sol:"8h", suelo:"Drenado", fert:"Alto", info:"Exportación mexicana" },
{ id:7, nombre:"Mango 🥭", dias:60, agua:"Moderado", sol:"Sol", suelo:"Arenoso", fert:"Alto", info:"Fruta tropical" },
{ id:8, nombre:"Plátano 🍌", dias:90, agua:"Alto", sol:"8h", suelo:"Húmedo", fert:"Alto", info:"Alta humedad" },
{ id:9, nombre:"Naranja 🍊", dias:50, agua:"Moderado", sol:"Sol", suelo:"Ácido", fert:"Alto", info:"Cítrico común" },
{ id:10, nombre:"Limón 🍋", dias:55, agua:"Moderado", sol:"Sol", suelo:"Drenado", fert:"Alto", info:"Muy usado en cocina" },

{ id:11, nombre:"Jitomate 🍅", dias:25, agua:"25 mm/sem", sol:"Sol", suelo:"Fértil", fert:"Alto", info:"Base de salsas" },
{ id:12, nombre:"Cebolla 🧅", dias:20, agua:"Moderado", sol:"Sol", suelo:"Suelto", fert:"Medio", info:"Condimento" },
{ id:13, nombre:"Chile 🌶️", dias:30, agua:"Moderado", sol:"Sol fuerte", suelo:"Fértil", fert:"Alto", info:"Picante" },
{ id:14, nombre:"Lechuga 🥬", dias:12, agua:"Frecuente", sol:"Semisombra", suelo:"Suelto", fert:"Alto", info:"Crecimiento rápido" },
{ id:15, nombre:"Zanahoria 🥕", dias:20, agua:"Moderado", sol:"Sol", suelo:"Profundo", fert:"Medio", info:"Raíz dulce" },

{ id:16, nombre:"Caña de azúcar 🎋", dias:120, agua:"Alto", sol:"Sol", suelo:"Fértil", fert:"Alto", info:"Producción de azúcar" },
{ id:17, nombre:"Café ☕", dias:180, agua:"Regular", sol:"Sombra", suelo:"Ácido", fert:"Alto", info:"Cultivo de sombra" },
{ id:18, nombre:"Cacao 🍫", dias:160, agua:"Constante", sol:"Sombra", suelo:"Húmedo", fert:"Alto", info:"Chocolate" },
{ id:19, nombre:"Algodón 🧵", dias:90, agua:"Moderado", sol:"Sol", suelo:"Fértil", fert:"Medio", info:"Fibra textil" },
{ id:20, nombre:"Aloe vera 🌿", dias:30, agua:"Bajo", sol:"Sol", suelo:"Arenoso", fert:"Bajo", info:"Medicinal" },

{ id:21, nombre:"Alfalfa 🌱", dias:25, agua:"Moderado", sol:"Sol", suelo:"Fértil", fert:"Medio", info:"Forraje" },
{ id:22, nombre:"Agave 🌵", dias:365, agua:"Muy bajo", sol:"Sol", suelo:"Seco", fert:"Bajo", info:"Tequila" },
{ id:23, nombre:"Papaya 🍈", dias:60, agua:"Moderado", sol:"Sol", suelo:"Ligero", fert:"Alto", info:"Fruta tropical" },
{ id:24, nombre:"Sandía 🍉", dias:35, agua:"Alto", sol:"Sol", suelo:"Arenoso", fert:"Alto", info:"Refrescante" },
{ id:25, nombre:"Calabaza 🎃", dias:30, agua:"Alto", sol:"Sol", suelo:"Fértil", fert:"Alto", info:"Milpa tradicional" }
];

/* =========================
   ➕ AGREGAR
   ========================= */
function agregar(id){
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");
  let p = plantas.find(x => x.id === id);

  h.push({
    ...p,
    fecha: Date.now()
  });

  localStorage.setItem("huerto", JSON.stringify(h));
  mostrarHuerto();
}

/* =========================
   🗑️ ELIMINAR
   ========================= */
function eliminar(fecha){
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");
  h = h.filter(p => p.fecha !== fecha);

  localStorage.setItem("huerto", JSON.stringify(h));
  mostrarHuerto();
}

/* =========================
   🌱 ETAPAS
   ========================= */
function etapa(d,t){
  if(!t) return "❓";
  let r = d/t;

  if(r < 0.25) return "🌱 Semilla";
  if(r < 0.5) return "🌿 Brote";
  if(r < 0.8) return "🌾 Creciendo";
  if(r < 1) return "🌼 Casi listo";
  return "🍅 Listo";
}

/* =========================
   📚 CATÁLOGO
   ========================= */
function mostrarCatalogo(){
  let d = document.getElementById("catalogo");
  d.innerHTML = "";

  plantas.forEach(p=>{
    d.innerHTML += `
    <div class="cultivo">
      <h3>${p.nombre}</h3>
      <small>${p.info}</small>

      💧 Agua: ${p.agua}<br>
      ☀️ Sol: ${p.sol}<br>
      🌱 Suelo: ${p.suelo}<br>
      🧪 Fertilizante: ${p.fert}<br>
      ⏳ Germinación: ${p.dias} días<br>

      <button onclick="agregar(${p.id})">➕ Agregar</button>
    </div>
    `;
  });
}

/* =========================
   🌿 HUERTO
   ========================= */
function mostrarHuerto(){
  let d = document.getElementById("huerto");
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");

  d.innerHTML = "";

  if(h.length === 0){
    d.innerHTML = "<p>🌱 No hay cultivos aún.</p>";
    return;
  }

  h.forEach(p=>{
    let dias = Math.floor((Date.now() - p.fecha)/(1000*60*60*24));
    if(isNaN(dias)) dias = 0;

    d.innerHTML += `
    <div class="cultivo">
      <h3>${p.nombre}</h3>
      <small>${p.info}</small><br><br>

      💧 ${p.agua}<br>
      ☀️ ${p.sol}<br>
      🌱 ${p.suelo}<br>
      🧪 ${p.fert}<br><br>

      ⏳ Días: ${dias}<br>
      🌱 Estado: ${etapa(dias,p.dias)}<br>
      📆 Total: ${p.dias} días<br>

      <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
    </div>
    `;
  });
}

/* =========================
   INICIO
   ========================= */
window.onload = function(){
  mostrarCatalogo();
  mostrarHuerto();
};

</script>

</body>
</html>
