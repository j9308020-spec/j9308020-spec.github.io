<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Huerto Simulador</title>

<style>
body { font-family: Arial; background:#f0f8f5; }

h1 { color: green; }

.seccion {
    background:white;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.cultivo {
    border:1px solid #ccc;
    padding:10px;
    margin:10px;
    background:white;
}

button {
    margin:5px;
    padding:5px;
    cursor:pointer;
}

.bad { color:red; }
.good { color:green; }
</style>
</head>

<body>

<h1>🌱 Huerto Simulador</h1>

<div class="seccion">
<h2>🌦️ Clima</h2>
<p id="clima"></p>
</div>

<div class="seccion">
<h2>💰 Estado</h2>
<p>Dinero: $<span id="dinero">50</span></p>
<p>Fertilizante: <span id="fertilizante">2</span></p>
</div>

<div class="seccion">
<h2>🌱 Plantar</h2>
<button onclick="plantar('Maíz 🌽')">🌽 Maíz</button>
<button onclick="plantar('Frijol 🫘')">🫘 Frijol</button>
<button onclick="plantar('Jitomate 🍅')">🍅 Jitomate</button>
</div>

<div class="seccion">
<h2>⚙️ Acciones</h2>
<button onclick="regar()">💧 Regar</button>
<button onclick="fertilizar()">🧬 Fertilizar</button>
</div>

<div class="seccion">
<h2>🌿 Huerto</h2>
<div id="huerto"></div>
</div>

<script>

let dinero = 50;
let fertilizante = 2;
let climaActual = "soleado ☀️";
let efectoClima = 1.2;

function getHuerto(){
    return JSON.parse(localStorage.getItem("huerto") || "[]");
}

function saveHuerto(h){
    localStorage.setItem("huerto", JSON.stringify(h));
}

//
// 🌦️ CLIMA
//
function cambiarClima(){
    const tipos = [
        {t:"soleado ☀️", e:1.3},
        {t:"lluvioso 🌧️", e:1.5},
        {t:"nublado ☁️", e:1.0},
        {t:"seco 🔥", e:0.7}
    ];

    let c = tipos[Math.floor(Math.random()*tipos.length)];

    climaActual = c.t;
    efectoClima = c.e;

    document.getElementById("clima").innerText =
    climaActual + " | crecimiento x" + efectoClima;
}

//
// 🌱 PLANTAR
//
function plantar(nombre){
    let h = getHuerto();

    h.push({
        nombre,
        crecimiento:0,
        plaga:false
    });

    saveHuerto(h);
    render();
}

//
// 💧 REGAR
//
function regar(){
    let h = getHuerto();

    h.forEach(p=>{
        p.crecimiento += 0.3 * efectoClima;
    });

    saveHuerto(h);
    render();
}

//
// 🧬 FERTILIZAR
//
function fertilizar(){

    if(fertilizante <= 0){
        alert("No tienes fertilizante");
        return;
    }

    fertilizante--;

    let h = getHuerto();

    h.forEach(p=>{
        p.crecimiento += 0.8;
        p.plaga = false;
    });

    saveHuerto(h);
    render();
}

//
// 💀 PLAGAS
//
function plagas(){
    let h = getHuerto();

    h.forEach(p=>{
        if(Math.random() < 0.2){
            p.plaga = true;
        }
    });

    saveHuerto(h);
}

//
// 🌱 CRECIMIENTO
//
function crecer(){
    let h = getHuerto();

    h.forEach(p=>{
        if(p.plaga){
            p.crecimiento -= 0.05;
        } else {
            p.crecimiento += 0.05 * efectoClima;
        }

        if(p.crecimiento < 0) p.crecimiento = 0;

        if(p.crecimiento >= 1.5){
            p.crecimiento = 1.5;
            dinero += 5;
        }
    });

    saveHuerto(h);
}

//
// 🌿 RENDER
//
function render(){

    let h = getHuerto();
    let div = document.getElementById("huerto");

    div.innerHTML = "";

    h.forEach(p=>{
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p>Progreso: ${p.crecimiento.toFixed(2)}</p>

            <p>${p.plaga ? "💀 PLAGA" : "🌿 sano"}</p>

            <div>
                ${p.nombre.includes("🌽") ? "🌽🌽🌽" : ""}
                ${p.nombre.includes("🍅") ? "🍅🍅🍅" : ""}
            </div>
        </div>
        `;
    });

    document.getElementById("dinero").innerText = dinero;
    document.getElementById("fertilizante").innerText = fertilizante;
}

//
// 🔁 LOOP
//
setInterval(()=>{
    cambiarClima();
    crecer();
    plagas();
    render();
},3000);

//
// 🚀 INICIO
//
window.onload = function(){
    cambiarClima();
    render();
}

</script>

</body>
</html>
