<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body{
    font-family: Arial;
    background:#f0f8f5;
}

h1{
    color:green;
}

.seccion{
    background:white;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.cultivo{
    border:1px solid #ccc;
    margin:10px;
    padding:10px;
    border-radius:10px;
    background:white;
}

input{
    padding:5px;
    margin:10px;
    width:200px;
}
</style>
</head>

<body>

<h1>🌱 Cuidado de Cultivos</h1>

<div class="seccion">
<h2>🔎 Buscar cultivo</h2>
<input id="busqueda" placeholder="Escribe un cultivo..." onkeyup="mostrar()">
</div>

<div class="seccion">
<h2>📚 Catálogo de cultivos</h2>
<div id="catalogo"></div>
</div>

<script>

const plantas = [
{
nombre:"Maíz 🌽",
tipo:"Grano",
riego:"Moderado",
sol:"Pleno sol (6–8h)",
tierra:"Fértil y drenada",
composta:"Alta",
germinacion:"5–10 días",
descripcion:"Cereal básico de alimentación en muchas culturas."
},

{
nombre:"Frijol 🫘",
tipo:"Leguminosa",
riego:"Moderado",
sol:"Pleno sol",
tierra:"Suelta y aireada",
composta:"Media",
germinacion:"5–8 días",
descripcion:"Aporta nitrógeno al suelo, mejora la fertilidad."
},

{
nombre:"Jitomate 🍅",
tipo:"Verdura",
riego:"Moderado constante",
sol:"Mucho sol",
tierra:"Fértil y profunda",
composta:"Alta",
germinacion:"5–10 días",
descripcion:"Uno de los cultivos más comunes en huertos caseros."
},

{
nombre:"Lechuga 🥬",
tipo:"Verdura",
riego:"Frecuente",
sol:"Semisombra",
tierra:"Suelta y húmeda",
composta:"Alta",
germinacion:"5–10 días",
descripcion:"Crece rápido y se adapta a climas frescos."
},

{
nombre:"Zanahoria 🥕",
tipo:"Raíz",
riego:"Moderado",
sol:"Pleno sol",
tierra:"Profunda y sin piedras",
composta:"Media",
germinacion:"10–20 días",
descripcion:"Su crecimiento depende de un suelo suelto."
},

{
nombre:"Mango 🥭",
tipo:"Fruta",
riego:"Moderado",
sol:"Sol directo",
tierra:"Arenosa y drenada",
composta:"Alta",
germinacion:"2–4 semanas",
descripcion:"Árbol tropical de crecimiento lento pero duradero."
},

{
nombre:"Limón 🍋",
tipo:"Fruta",
riego:"Moderado",
sol:"6–8h de sol",
tierra:"Ligeramente ácida",
composta:"Alta",
germinacion:"10–20 días",
descripcion:"Requiere cuidados constantes y buen drenaje."
},

{
nombre:"Café ☕",
tipo:"Árbol",
riego:"Regular",
sol:"Sombra parcial",
tierra:"Ácida y rica",
composta:"Alta",
germinacion:"30–60 días",
descripcion:"Cultivo tropical sensible a clima y suelo."
}
];

function mostrar(){

    let div = document.getElementById("catalogo");
    let filtro = document.getElementById("busqueda").value.toLowerCase();

    div.innerHTML = "";

    plantas
    .filter(p => p.nombre.toLowerCase().includes(filtro))
    .forEach(p => {

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p><b>Tipo:</b> ${p.tipo}</p>
            <p><b>Riego:</b> ${p.riego}</p>
            <p><b>Sol:</b> ${p.sol}</p>
            <p><b>Tierra:</b> ${p.tierra}</p>
            <p><b>Composta:</b> ${p.composta}</p>
            <p><b>Germinación:</b> ${p.germinacion}</p>

            <p>${p.descripcion}</p>
        </div>
        `;
    });
}

window.onload = function(){
    mostrar();
}

</script>

</body>
</html>
