// ➕ agregar
function agregar(id){
    let h=JSON.parse(localStorage.getItem("huerto")||"[]");
    h.push({...plantas.find(p=>p.id===id),fecha:Date.now()});
    localStorage.setItem("huerto",JSON.stringify(h));
    mostrarHuerto();
}

// 🗑️ eliminar con confirmación
function eliminar(fecha){
    if(!confirm("⚠️ ¿Seguro que quieres eliminar este cultivo?")) return;

    let h=JSON.parse(localStorage.getItem("huerto")||"[]");
    h=h.filter(p=>p.fecha!==fecha);
    localStorage.setItem("huerto",JSON.stringify(h));
    mostrarHuerto();
}

// 🌱 etapas
function etapa(d,t){
    let r=d/t;
    if(r<0.25) return "🌱 Semilla";
    if(r<0.5) return "🌿 Brote";
    if(r<0.8) return "🌾 Creciendo";
    if(r<1) return "🌼 Casi listo";
    return "🍅 Listo para cosecha";
}

// 🌿 mostrar huerto
function mostrarHuerto(){
    let d=document.getElementById("huerto");
    let h=JSON.parse(localStorage.getItem("huerto")||"[]");

    d.innerHTML="";

    h.forEach(p=>{
        let dias=Math.floor((Date.now()-p.fecha)/(1000*60*60*24));

        d.innerHTML+=`
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <small>${p.info}</small><br><br>

            💧 Riego: ${p.riego}<br>
            ☀️ Sol: ${p.sol}<br>
            🌱 Suelo: ${p.suelo}<br>
            🧪 Fertilizante: ${p.fert}<br><br>

            📅 Plantado: ${new Date(p.fecha).toLocaleDateString()}<br>
            ⏳ Días: ${dias}<br>
            🌱 Estado: ${etapa(dias,p.dias)}<br>
            📆 Total: ${p.dias} días<br>

            <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
        </div>
        `;
    });
}

window.onload=mostrarHuerto;
