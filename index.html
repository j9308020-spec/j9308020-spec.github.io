<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Inteligente Enciclopedia</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; cursor: pointer; }

input { padding: 5px; margin: 5px; }

.info { font-size: 13px; color: #333; line-height: 1.4; }
small { color: gray; }
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente (Versión Enciclopedia)</h1>

<div class="seccion">
<h2>👤 Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>🌿 Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">📚 Catálogo EXTENSO de Cultivos</h2>

<input id="busqueda" placeholder="🔍 Buscar cultivo..." onkeyup="mostrarCatalogo()">

<div id="catalogo"></div>

<script>

const plantas = [
{
id:1,
nombre:"Maíz 🌽",
info:`
💧 RIEGO:
- Moderado constante, necesita humedad estable.
- Si falta agua en floración, baja la producción.

☀️ SOL:
- Requiere sol directo 6–8 horas.
- Sin sol crece débil y con mazorcas pequeñas.

🌱 SUELO:
- Profundo, fértil y aireado.
- No soporta suelos compactos.

🧪 FERTILIZACIÓN:
- Alta en nitrógeno al inicio.
- Después fósforo y potasio.

⚠️ PROBLEMAS:
- Gusanos en raíz.
- Falta de nutrientes = hojas amarillas.

💡 TIP:
- Plántalo en bloques, no en línea para mejor polinización.
`
},

{
id:2,
nombre:"Frijol 🫘",
info:`
💧 RIEGO:
- Moderado, sin exceso.
- Encharcarlo lo mata rápido.

☀️ SOL:
- 6 horas de sol mínimo.

🌱 SUELO:
- Ligero y aireado.
- Fija nitrógeno en el suelo (mejora la tierra).

🧪 FERTILIZACIÓN:
- Poco fertilizante necesario.

⚠️ PROBLEMAS:
- Hongos por humedad.
- Pulgones.

💡 TIP:
- Plántalo cerca de maíz (sistema tradicional milpa).
`
},

{
id:3,
nombre:"Jitomate 🍅",
info:`
💧 RIEGO:
- Constante pero sin encharcar.
- Cambios bruscos causan grietas en el fruto.

☀️ SOL:
- 6–8 horas diarias.

🌱 SUELO:
- Rico en nutrientes y drenado.

🧪 FERTILIZACIÓN:
- Alta en potasio para frutos grandes.

⚠️ PROBLEMAS:
- Hongos en hojas.
- Plagas como mosca blanca.

💡 TIP:
- Usa tutores o se cae por el peso.
`
},

{
id:4,
nombre:"Lechuga 🥬",
info:`
💧 RIEGO:
- Frecuente, suelo húmedo siempre.

☀️ SOL:
- Semisombra ideal.

🌱 SUELO:
- Suelto y fresco.

🧪 FERTILIZACIÓN:
- Moderada.

⚠️ PROBLEMAS:
- Amargura por calor.
- Se espiga si hace mucho sol.

💡 TIP:
- Cosecha temprano para mejor sabor.
`
},

{
id:5,
nombre:"Zanahoria 🥕",
info:`
💧 RIEGO:
- Constante pero suave.

☀️ SOL:
- Sol directo.

🌱 SUELO:
- Profundo, sin piedras.
- Si hay piedras salen deformes.

🧪 FERTILIZACIÓN:
- Media, evita exceso de nitrógeno.

⚠️ PROBLEMAS:
- Raíces torcidas.

💡 TIP:
- No trasplantar, si no se daña la raíz.
`
}
];

function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "👋 Hola " + nombre + " desde " + ubicacion;
}

function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    let filtro = document.getElementById("busqueda").value.toLowerCase();

    div.innerHTML = "";

    plantas
    .filter(p => p.nombre.toLowerCase().includes(filtro))
    .forEach((p) => {

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <div class="info">
                ${p.info.replace(/\n/g, "<br>")}
            </div>

            <button onclick="agregar(${p.id})">
                ➕ Agregar al huerto
            </button>
        </div>
        `;
    });
}

function agregar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    let planta = plantas.find(p => p.id === id);

    huerto.push({
        nombre: planta.nombre,
        info: planta.info,
        fecha: new Date().toLocaleDateString()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function eliminar(nombre){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    huerto = huerto.filter(p => p.nombre !== nombre);

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    div.innerHTML = "";

    huerto.forEach((p) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <div class="info">${p.info.replace(/\n/g,"<br>")}</div>
            <p>📅 ${p.fecha}</p>

            <button onclick="eliminar('${p.nombre}')">🗑️ Eliminar</button>
        </div>
        `;
    });
}

window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
