<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Huerto Simulador</title>

<style>
body { font-family: Arial; background:#f0f8f5; }

h1 { color: green; }

.seccion {
    background:white;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.cultivo {
    border:1px solid #ccc;
    padding:10px;
    margin:10px;
    background:white;
}

button {
    margin:5px;
}
</style>
</head>

<body>

<h1>🌱 Huerto Simulador</h1>

<div class="seccion">
<h2>Estado</h2>
<p>Dinero: $<span id="dinero">50</span></p>
<p>Fertilizante: <span id="fertilizante"></span></p>
</div>

<div class="seccion">
<h2>Tienda</h2>
<button onclick="comprarFertilizante()">Comprar fertilizante ($10)</button>
</div>

<div class="seccion">
<h2>Plantar</h2>
<button onclick="plantar('Maíz')">Maíz</button>
<button onclick="plantar('Frijol')">Frijol</button>
<button onclick="plantar('Jitomate')">Jitomate</button>
</div>

<div class="seccion">
<h2>Acciones</h2>
<button onclick="regar()">Regar</button>
<button onclick="fertilizar()">Fertilizar</button>
</div>

<div class="seccion">
<h2>Huerto</h2>
<div id="huerto"></div>
</div>

<script>

let dinero = 50;
let fertilizante = 2;

function getHuerto(){
    return JSON.parse(localStorage.getItem("huerto") || "[]");
}

function saveHuerto(h){
    localStorage.setItem("huerto", JSON.stringify(h));
}

// plantar
function plantar(nombre){
    let h = getHuerto();

    h.push({
        nombre,
        crecimiento:0
    });

    saveHuerto(h);
    render();
}

// regar
function regar(){
    let h = getHuerto();

    h.forEach(p=>{
        p.crecimiento += 0.3;
    });

    saveHuerto(h);
    render();
}

// fertilizar (con costo)
function fertilizar(){

    if(fertilizante <= 0){
        alert("No tienes fertilizante");
        return;
    }

    fertilizante--;

    let h = getHuerto();

    h.forEach(p=>{
        p.crecimiento += 0.8;
    });

    saveHuerto(h);
    render();
}
