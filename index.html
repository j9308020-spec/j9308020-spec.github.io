/* =========================
   🌦️ CLIMA SEGÚN UBICACIÓN
   ========================= */

function analizarClima(ubicacion){
  let u = ubicacion.toLowerCase();

  if(u.includes("desierto") || u.includes("sonora") || u.includes("calor")){
    return "🌵 Tus plantas crecerán rápido pero necesitarán más agua.";
  }

  if(u.includes("frio") || u.includes("montaña") || u.includes("nevado")){
    return "🥶 Tus plantas se tardarán más de lo normal.";
  }

  if(u.includes("selva") || u.includes("humedo") || u.includes("veracruz")){
    return "🌧️ Buen crecimiento, pero cuidado con exceso de agua.";
  }

  if(u.includes("mexico") || u.includes("ciudad") || u.includes("templado")){
    return "🌤️ Tus plantas no tendrán problema.";
  }

  return "🌿 Están en condiciones casi perfectas.";
}

/* =========================
   PERFIL
   ========================= */

function guardarPerfil(){
  let n = document.getElementById("nombre").value;
  let u = document.getElementById("ubicacion").value;

  localStorage.setItem("nombre", n);
  localStorage.setItem("ubicacion", u);

  let mensaje = analizarClima(u);

  document.getElementById("saludo").innerHTML =
  "👤 " + n + " desde 📍 " + u + "<br><br>" + mensaje;
}

/* =========================
   AGREGAR / ELIMINAR
   ========================= */

function agregar(id){
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");
  let p = plantas.find(x => x.id === id);

  h.push({...p, fecha: Date.now()});
  localStorage.setItem("huerto", JSON.stringify(h));

  mostrarHuerto();
}

function eliminar(fecha){
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");
  h = h.filter(p => p.fecha !== fecha);

  localStorage.setItem("huerto", JSON.stringify(h));
  mostrarHuerto();
}

/* =========================
   CATÁLOGO + BUSCADOR
   ========================= */

function mostrarCatalogo(){
  let d = document.getElementById("catalogo");
  let f = document.getElementById("busqueda").value.toLowerCase();

  d.innerHTML = "";

  plantas
  .filter(p => p.nombre.toLowerCase().includes(f))
  .forEach(p => {

    d.innerHTML += `
    <div class="cultivo">
      <h3>${p.nombre}</h3>

      💧 ${p.agua}<br>
      ☀️ ${p.sol}<br>
      🌱 ${p.suelo}<br>
      🧪 ${p.fert}<br>
      ⏳ ${p.dias} días<br>

      <button onclick="agregar(${p.id})">➕ Agregar</button>
    </div>
    `;
  });
}

/* =========================
   HUERTO
   ========================= */

function mostrarHuerto(){
  let d = document.getElementById("huerto");
  let h = JSON.parse(localStorage.getItem("huerto") || "[]");

  d.innerHTML = "";

  if(h.length === 0){
    d.innerHTML = "🌱 No tienes cultivos aún";
    return;
  }

  h.forEach(p => {
    let dias = Math.floor((Date.now() - p.fecha) / 86400000);
    if(isNaN(dias)) dias = 0;

    d.innerHTML += `
    <div class="cultivo">
      <h3>${p.nombre}</h3>

      ⏳ ${dias} días creciendo<br>
      📅 Total: ${p.dias} días<br><br>

      💧 ${p.agua}<br>
      ☀️ ${p.sol}<br>
      🌱 ${p.suelo}<br>

      <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
    </div>
    `;
  });
}

/* =========================
   INICIO
   ========================= */

window.onload = function(){

  let nombre = localStorage.getItem("nombre");
  let ubicacion = localStorage.getItem("ubicacion");

  if(nombre){
    let mensaje = analizarClima(ubicacion);

    document.getElementById("saludo").innerHTML =
    "👤 " + nombre + " desde 📍 " + ubicacion + "<br><br>" + mensaje;
  }

  mostrarCatalogo();
  mostrarHuerto();
};
