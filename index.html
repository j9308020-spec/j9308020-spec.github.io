<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; }
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente</h1>

<div class="seccion">
<h2>Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">Catálogo de Cultivos</h2>
<div id="catalogo"></div>

<script>

const plantas = [

{ nombre:"Maíz", riego:"Moderado constante", sol:"Pleno sol", tierra:"Fértil y bien drenada", composta:"Alta", germinacion:"5–10 días" },

{ nombre:"Frijol", riego:"Moderado", sol:"6–8 horas de sol", tierra:"Suelta y ligera", composta:"Media", germinacion:"5–8 días" },

{ nombre:"Trigo", riego:"Bajo a moderado", sol:"Pleno sol", tierra:"Fértil y bien drenada", composta:"Media", germinacion:"7–10 días" },

{ nombre:"Arroz", riego:"Muy alto (inundación parcial)", sol:"Pleno sol", tierra:"Arcillosa y retenedora de agua", composta:"Alta", germinacion:"7–14 días" },

{ nombre:"Sorgo", riego:"Bajo a moderado", sol:"Pleno sol", tierra:"Adaptable y bien drenada", composta:"Media", germinacion:"5–10 días" },

{ nombre:"Aguacate", riego:"Moderado", sol:"Mucho sol", tierra:"Suelta y drenada", composta:"Alta", germinacion:"2–6 semanas" },

{ nombre:"Mango", riego:"Moderado", sol:"Sol directo", tierra:"Arenosa y drenada", composta:"Alta", germinacion:"2–4 semanas" },

{ nombre:"Plátano", riego:"Abundante", sol:"6–8 horas de sol", tierra:"Rica en materia orgánica", composta:"Alta", germinacion:"1–3 meses" },

{ nombre:"Naranja", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil ligeramente ácida", composta:"Alta", germinacion:"2–6 semanas" },

{ nombre:"Limón", riego:"Moderado", sol:"6–8 horas de sol", tierra:"Suelta y drenada", composta:"Alta", germinacion:"10–20 días" },

{ nombre:"Jitomate", riego:"Moderado constante", sol:"6–8 horas de sol", tierra:"Fértil y ligera", composta:"Alta", germinacion:"5–10 días" },

{ nombre:"Cebolla", riego:"Moderado", sol:"Pleno sol", tierra:"Suelta y bien drenada", composta:"Media", germinacion:"7–10 días" },

{ nombre:"Chile", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil y ligera", composta:"Alta", germinacion:"7–14 días" },

{ nombre:"Lechuga", riego:"Frecuente", sol:"Semisombra o sol suave", tierra:"Suelta y fértil", composta:"Alta", germinacion:"5–10 días" },

{ nombre:"Zanahoria", riego:"Moderado", sol:"6–8 horas de sol", tierra:"Profunda y suelta", composta:"Media", germinacion:"10–20 días" },

{ nombre:"Caña de azúcar", riego:"Abundante", sol:"Pleno sol", tierra:"Fértil y profunda", composta:"Alta", germinacion:"7–14 días" },

{ nombre:"Café", riego:"Regular", sol:"Sombra parcial", tierra:"Ácida y orgánica", composta:"Alta", germinacion:"30–60 días" },

{ nombre:"Cacao", riego:"Constante", sol:"Sombra parcial", tierra:"Húmeda y rica en materia orgánica", composta:"Alta", germinacion:"7–21 días" },

{ nombre:"Algodón", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil y drenada", composta:"Media", germinacion:"5–10 días" },

{ nombre:"Aloe vera", riego:"Bajo", sol:"Mucho sol", tierra:"Arenosa y drenada", composta:"Baja", germinacion:"15–30 días" },

{ nombre:"Alfalfa", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil y suelta", composta:"Media", germinacion:"5–10 días" },

{ nombre:"Agave", riego:"Muy bajo", sol:"Pleno sol", tierra:"Pedregosa o arenosa", composta:"Baja", germinacion:"2–4 semanas" },

{ nombre:"Papaya", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil y drenada", composta:"Alta", germinacion:"2–4 semanas" },

{ nombre:"Sandía", riego:"Abundante", sol:"Mucho sol", tierra:"Arenosa y drenada", composta:"Alta", germinacion:"4–8 días" },

{ nombre:"Calabaza", riego:"Constante", sol:"Mucho sol", tierra:"Fértil y drenada", composta:"Alta", germinacion:"5–10 días" }

];


function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "Hola " + nombre + " desde " + ubicacion;
}

function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    div.innerHTML = "";

    plantas.forEach((p, index) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>💧 Riego: ${p.riego}</p>
            <p>☀️ Sol: ${p.sol}</p>
            <p>🌱 Tierra: ${p.tierra}</p>
            <p>♻️ Composta: ${p.composta}</p>
            <p>⏳ Germinación: ${p.germinacion}</p>

            <button onclick="agregar(${index})">
                Agregar al huerto
            </button>
        </div>
        `;
    });
}

function agregar(index){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    huerto.push({
        ...plantas[index],
        id: Date.now(),
        fecha: new Date().toLocaleDateString()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function eliminar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];
    huerto = huerto.filter(p => p.id !== id);
    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    div.innerHTML = "";

    huerto.forEach((p) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>💧 ${p.riego}</p>
            <p>☀️ ${p.sol}</p>
            <p>🌱 ${p.tierra}</p>
            <p>♻️ ${p.composta}</p>
            <p>⏳ ${p.germinacion}</p>
            <p>📅 ${p.fecha}</p>

            <button onclick="eliminar(${p.id})">Eliminar</button>
        </div>
        `;
    });
}

window.onload = function(){
    let nombre = localStorage.getItem("nombre");
    let ubicacion = localStorage.getItem("ubicacion");

    if(nombre){
        document.getElementById("saludo").innerText =
        "Hola " + nombre + " desde " + ubicacion;
    }

    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
