<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Estable</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }
small { color:#555; }
button { margin-top:5px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 Huerto Inteligente (ESTABLE)</h1>

<h2>📚 Catálogo</h2>
<div id="catalogo"></div>

<hr>

<h2>🌿 Mi Huerto</h2>
<div id="huerto"></div>

<script>

// 🌱 catálogo mínimo seguro (siempre visible)
const plantas = [
{ id:1, nombre:"Maíz 🌽", dias:10, agua:"Moderado", sol:"Sol", suelo:"Fértil", fert:"Alto", info:"Base alimenticia" },
{ id:2, nombre:"Frijol 🫘", dias:8, agua:"Moderado", sol:"Sol", suelo:"Suelto", fert:"Medio", info:"Proteína vegetal" },
{ id:3, nombre:"Jitomate 🍅", dias:25, agua:"Moderado", sol:"Sol", suelo:"Fértil", fert:"Alto", info:"Salsa mexicana" },
{ id:4, nombre:"Lechuga 🥬", dias:12, agua:"Frecuente", sol:"Semisombra", suelo:"Suelto", fert:"Alto", info:"Crecimiento rápido" },
{ id:5, nombre:"Zanahoria 🥕", dias:20, agua:"Moderado", sol:"Sol", suelo:"Profundo", fert:"Medio", info:"Raíz comestible" }
];

// 🌿 asegurar localStorage limpio
function getHuerto(){
    try{
        return JSON.parse(localStorage.getItem("huerto") || "[]");
    } catch(e){
        return [];
    }
}

function saveHuerto(h){
    localStorage.setItem("huerto", JSON.stringify(h));
}

// ➕ agregar
function agregar(id){
    let h = getHuerto();
    let planta = plantas.find(p => p.id === id);

    if(!planta) return;

    h.push({
        ...planta,
        fecha: Date.now()
    });

    saveHuerto(h);
    mostrarHuerto();
}

// 🗑️ eliminar
function eliminar(fecha){
    let h = getHuerto();
    h = h.filter(p => p.fecha !== fecha);
    saveHuerto(h);
    mostrarHuerto();
}

// 🌱 estado
function etapa(d, t){
    if(!t) return "❓";

    let r = d/t;
    if(r < 0.25) return "🌱 Semilla";
    if(r < 0.5) return "🌿 Brote";
    if(r < 0.8) return "🌾 Creciendo";
    if(r < 1) return "🌼 Casi listo";
    return "🍅 Listo";
}

// 📚 catálogo (SIEMPRE aparece)
function mostrarCatalogo(){
    let d = document.getElementById("catalogo");
    d.innerHTML = "";

    plantas.forEach(p=>{
        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <small>${p.info}</small><br>
            ⏳ ${p.dias} días<br>
            💧 ${p.agua} | ☀️ ${p.sol}<br>

            <button onclick="agregar(${p.id})">➕ Agregar</button>
        </div>
        `;
    });
}

// 🌿 huerto (NO se puede quedar vacío invisible)
function mostrarHuerto(){
    let d = document.getElementById("huerto");
    let h = getHuerto();

    d.innerHTML = "";

    if(h.length === 0){
        d.innerHTML = "<p>🌱 No hay cultivos aún. Agrega uno del catálogo.</p>";
        return;
    }

    h.forEach(p=>{
        let dias = Math.floor((Date.now() - p.fecha) / (1000*60*60*24));
        if(isNaN(dias)) dias = 0;

        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <small>${p.info}</small><br><br>

            💧 ${p.agua}<br>
            ☀️ ${p.sol}<br>
            🌱 ${p.suelo}<br>
            🧪 ${p.fert}<br><br>

            ⏳ Días: ${dias}<br>
            🌱 Estado: ${etapa(dias,p.dias)}<br>

            <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
        </div>
        `;
    });
}

// iniciar seguro
window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();
};

</script>

</body>
</html>
