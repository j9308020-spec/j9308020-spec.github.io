<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; }
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente</h1>

<div class="seccion">
<h2>Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">Catálogo de Cultivos</h2>
<div id="catalogo"></div>

<script>

const plantas = [
{ nombre:"Maíz", tipo:"Grano", riego:"Moderado", sol:"Pleno sol", tierra:"Fértil", composta:"Alta", germinacion:"5–10 días" },
{ nombre:"Frijol", tipo:"Grano", riego:"Moderado", sol:"Sol", tierra:"Suelta", composta:"Media", germinacion:"5–8 días" },
{ nombre:"Trigo", tipo:"Grano", riego:"Bajo", sol:"Sol", tierra:"Fértil", composta:"Media", germinacion:"7–10 días" },

{ nombre:"Jitomate", tipo:"Verdura", riego:"Moderado", sol:"Sol", tierra:"Fértil", composta:"Alta", germinacion:"5–10 días" },
{ nombre:"Lechuga", tipo:"Verdura", riego:"Frecuente", sol:"Semisombra", tierra:"Suelta", composta:"Alta", germinacion:"5–10 días" },
{ nombre:"Zanahoria", tipo:"Verdura", riego:"Moderado", sol:"Sol", tierra:"Profunda", composta:"Media", germinacion:"10–20 días" },

{ nombre:"Mango", tipo:"Fruta", riego:"Moderado", sol:"Sol directo", tierra:"Arenosa", composta:"Alta", germinacion:"2–4 semanas" },
{ nombre:"Manzana", tipo:"Fruta", riego:"Moderado", sol:"Sol", tierra:"Fértil", composta:"Alta", germinacion:"2–4 semanas" },
{ nombre:"Sandía", tipo:"Fruta", riego:"Abundante", sol:"Sol", tierra:"Arenosa", composta:"Alta", germinacion:"4–8 días" },

{ nombre:"Café", tipo:"Arbol", riego:"Regular", sol:"Sombra", tierra:"Ácida", composta:"Alta", germinacion:"30–60 días" },
{ nombre:"Cacao", tipo:"Arbol", riego:"Constante", sol:"Sombra", tierra:"Húmeda", composta:"Alta", germinacion:"7–21 días" },

{ nombre:"Agave", tipo:"Resistente", riego:"Bajo", sol:"Sol", tierra:"Arenosa", composta:"Baja", germinacion:"2–4 semanas" }
];


function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "Hola " + nombre + " desde " + ubicacion;
}

function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    div.innerHTML = "";

    plantas.forEach((p, index) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>💧 Riego: ${p.riego}</p>
            <p>☀️ Sol: ${p.sol}</p>
            <p>🌱 Tierra: ${p.tierra}</p>
            <p>♻️ Composta: ${p.composta}</p>
            <p>⏳ Germinación: ${p.germinacion}</p>

            <button onclick="agregar(${index})">
                Agregar al huerto
            </button>
        </div>
        `;
    });
}

function agregar(index){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    huerto.push({
        ...plantas[index],
        id: Date.now(),
        fecha: new Date().toLocaleDateString()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function eliminar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];
    huerto = huerto.filter(p => p.id !== id);
    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    div.innerHTML = "";

    huerto.forEach((p) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>💧 ${p.riego}</p>
            <p>☀️ ${p.sol}</p>
            <p>🌱 ${p.tierra}</p>
            <p>♻️ ${p.composta}</p>
            <p>⏳ ${p.germinacion}</p>
            <p>📅 ${p.fecha}</p>

            <button onclick="eliminar(${p.id})">Eliminar</button>
        </div>
        `;
    });
}

window.onload = function(){
    let nombre = localStorage.getItem("nombre");
    let ubicacion = localStorage.getItem("ubicacion");

    if(nombre){
        document.getElementById("saludo").innerText =
        "Hola " + nombre + " desde " + ubicacion;
    }

    function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    let filtro = document.getElementById("busqueda").value.toLowerCase();

    div.innerHTML = "";

    plantas
    .filter(p => p.nombre.toLowerCase().includes(filtro))
    .forEach((p, index) => {

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre} (${p.tipo})</h3>
            <p>💧 ${p.riego}</p>
            <p>☀️ ${p.sol}</p>
            <p>🌱 ${p.tierra}</p>
            <p>♻️ ${p.composta}</p>
            <p>⏳ ${p.germinacion}</p>

            <button onclick="agregar(${index})">
                Agregar al huerto
            </button>
        </div>
        `;
    });
    }
    
    mostrarHuerto();
}

</script>

</body>
</html>
