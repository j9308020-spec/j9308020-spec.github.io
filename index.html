<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Huerto Simulador PRO</title>

<style>
body { font-family: Arial; background:#f0f8f5; }

h1 { color: green; }

.seccion {
    background:white;
    margin:10px;
    padding:10px;
    border-radius:10px;
}

.cultivo, .item {
    border:1px solid #ccc;
    padding:10px;
    margin:10px;
    background:white;
}

button {
    margin:5px;
    padding:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>🌱 Huerto Simulador PRO</h1>

<div class="seccion">
<h2>🌦️ Clima</h2>
<p id="clima"></p>
</div>

<div class="seccion">
<h2>💰 Dinero</h2>
<p>$<span id="dinero">50</span></p>
<p>Fertilizante: <span id="fertilizante">2</span></p>
</div>

<div class="seccion">
<h2>🌱 Plantar</h2>
<button onclick="plantar('Maíz 🌽')">🌽 Maíz</button>
<button onclick="plantar('Jitomate 🍅')">🍅 Jitomate</button>
<button onclick="plantar('Frijol 🫘')">🫘 Frijol</button>
</div>

<div class="seccion">
<h2>⚙️ Acciones</h2>
<button onclick="regar()">💧 Regar</button>
<button onclick="fertilizar()">🧬 Fertilizar</button>
</div>

<div class="seccion">
<h2>🏪 Tienda</h2>
<button onclick="comprarFertilizante()">Comprar fertilizante ($10)</button>
</div>

<div class="seccion">
<h2>📦 Inventario</h2>
<div id="inventario"></div>
</div>

<div class="seccion">
<h2>🌿 Huerto</h2>
<div id="huerto"></div>
</div>

<script>

let dinero = 50;
let fertilizante = 2;

let cooldownRiego = false;

let inventario = [];

//
// 🌦️ CLIMA (REALISTA)
//
let climaActual = "normal ☁️";

function cambiarClima(){

    const clima = [
        {t:"normal ☁️", w:0.6},
        {t:"soleado ☀️", w:0.2},
        {t:"lluvioso 🌧️", w:0.15},
        {t:"seco 🔥", w:0.05}
    ];

    let r = Math.random();
    let acc = 0;

    for(let c of clima){
        acc += c.w;
        if(r <= acc){
            climaActual = c.t;
            break;
        }
    }

    document.getElementById("clima").innerText = climaActual;
}

//
// 🌱 HUERTO
//
function getHuerto(){
    return JSON.parse(localStorage.getItem("huerto") || "[]");
}

function saveHuerto(h){
    localStorage.setItem("huerto", JSON.stringify(h));
}

//
// 🌱 PLANTAR
//
function plantar(nombre){
    let h = getHuerto();

    h.push({
        nombre,
        crecimiento:0,
        listo:false
    });

    saveHuerto(h);
    render();
}

//
// 💧 RIEGO CON COOLDOWN
//
function regar(){

    if(cooldownRiego){
        alert("⏳ Espera antes de regar otra vez");
        return;
    }

    cooldownRiego = true;

    setTimeout(()=> cooldownRiego = false, 5000);

    let h = getHuerto();

    h.forEach(p=>{
        if(!p.listo){
            p.crecimiento += 0.3;
        }
    });

    saveHuerto(h);
    render();
}

//
// 🧬 FERTILIZAR (CUESTA)
//
function fertilizar(){

    if(fertilizante <= 0){
        alert("No tienes fertilizante");
        return;
    }

    fertilizante--;

    let h = getHuerto();

    h.forEach(p=>{
        if(!p.listo){
            p.crecimiento += 0.7;
        }
    });

    saveHuerto(h);
    render();
}

//
// 🏪 COMPRAR
//
function comprarFertilizante(){

    if(dinero < 10){
        alert("No tienes dinero");
        return;
    }

    dinero -= 10;
    fertilizante++;

    render();
}

//
// 🌱 CRECIMIENTO + COSECHA
//
function crecer(){

    let h = getHuerto();

    h.forEach(p=>{
        if(p.listo) return;

        p.crecimiento += 0.05;

        if(p.crecimiento >= 1.5){
            p.crecimiento = 1.5;
            p.listo = true;

            inventario.push(p.nombre);
        }
    });

    saveHuerto(h);
}

//
// 📦 INVENTARIO
//
function renderInventario(){

    let div = document.getElementById("inventario");
    div.innerHTML = "";

    inventario.forEach((i,idx)=>{
        div.innerHTML += `
        <div class="item">
            ${i}
            <button onclick="vender(${idx})">Vender ($8)</button>
        </div>
        `;
    });
}

//
// 💰 VENDER
//
function vender(i){

    dinero += 8;
    inventario.splice(i,1);

    render();
}

//
// 🌿 RENDER
//
function render(){

    let h = getHuerto();
    let div = document.getElementById("huerto");

    div.innerHTML = "";

    h.forEach(p=>{
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>${p.listo ? "🍅 LISTA PARA COSECHA" : "🌱 creciendo"}</p>
            <p>${p.crecimiento.toFixed(2)}</p>
        </div>
        `;
    });

    document.getElementById("dinero").innerText = dinero;
    document.getElementById("fertilizante").innerText = fertilizante;

    renderInventario();
}

//
// 🔁 LOOP
//
setInterval(()=>{
    cambiarClima();
    crecer();
    render();
},10000); // simula tiempo más lento

//
// ⏳ CLIMA LENTO (2 HORAS SIMULADAS)
//
setInterval(()=>{
    cambiarClima();
}, 7200000); // 2 horas

window.onload = function(){
    cambiarClima();
    render();
}

</script>

</body>
</html>
