<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Inteligente Pro</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; cursor: pointer; }

input {
    padding: 5px;
    margin: 5px;
}
small { color: gray; }
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente Pro</h1>

<div class="seccion">
<h2>👤 Perfil del agricultor</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>🌿 Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">📚 Catálogo de Cultivos</h2>

<input id="busqueda" placeholder="🔍 Buscar cultivo..." onkeyup="mostrarCatalogo()">

<div id="catalogo"></div>

<script>

const plantas = [
{
id:1,
nombre:"Maíz 🌽",
tipo:"Grano",
riego:"💧 Moderado constante (sin encharcar)",
sol:"☀️ Pleno sol",
tierra:"🌱 Fértil, profunda y aireada",
composta:"♻️ Alta (le encanta el nitrógeno)",
germinacion:"⏳ 5–10 días",
tips:"💡 Necesita espacio para crecer alto. Plántalo separado de otras plantas.",
warning:"⚠️ No tolera suelos secos prolongados."
},

{
id:2,
nombre:"Frijol 🫘",
tipo:"Grano",
riego:"💧 Moderado",
sol:"☀️ Sol directo",
tierra:"🌱 Suelta y ligera",
composta:"♻️ Media",
germinacion:"⏳ 5–8 días",
tips:"💡 Ayuda a mejorar el suelo porque fija nitrógeno.",
warning:"⚠️ Evita exceso de agua o se pudren las raíces."
},

{
id:3,
nombre:"Trigo 🌾",
tipo:"Grano",
riego:"💧 Bajo",
sol:"☀️ Mucho sol",
tierra:"🌱 Fértil y drenada",
composta:"♻️ Media",
germinacion:"⏳ 7–10 días",
tips:"💡 Resiste bien climas secos.",
warning:"⚠️ No soporta suelos encharcados."
},

{
id:4,
nombre:"Jitomate 🍅",
tipo:"Verdura",
riego:"💧 Moderado constante",
sol:"☀️ 6–8 horas de sol",
tierra:"🌱 Fértil y ligera",
composta:"♻️ Alta",
germinacion:"⏳ 5–10 días",
tips:"💡 Necesita tutores para sostenerse cuando crece.",
warning:"⚠️ Sensible a plagas si hay mucha humedad."
},

{
id:5,
nombre:"Lechuga 🥬",
tipo:"Verdura",
riego:"💧 Frecuente",
sol:"🌤️ Semisombra",
tierra:"🌱 Suelta y fresca",
composta:"♻️ Alta",
germinacion:"⏳ 5–10 días",
tips:"💡 Crece mejor en clima fresco.",
warning:"⚠️ El calor extremo la amarga."
},

{
id:6,
nombre:"Zanahoria 🥕",
tipo:"Verdura",
riego:"💧 Moderado",
sol:"☀️ Sol directo",
tierra:"🌱 Profunda y sin piedras",
composta:"♻️ Media",
germinacion:"⏳ 10–20 días",
tips:"💡 La tierra debe estar muy suelta o salen deformes.",
warning:"⚠️ No mover el suelo mientras crece."
},

{
id:7,
nombre:"Mango 🥭",
tipo:"Fruta",
riego:"💧 Moderado",
sol:"☀️ Sol directo",
tierra:"🌱 Arenosa y drenada",
composta:"♻️ Alta",
germinacion:"⏳ 2–4 semanas",
tips:"💡 Árbol grande, necesita espacio.",
warning:"⚠️ Crecimiento lento al inicio."
},

{
id:8,
nombre:"Sandía 🍉",
tipo:"Fruta",
riego:"💧 Abundante",
sol:"☀️ Mucho sol",
tierra:"🌱 Arenosa",
composta:"♻️ Alta",
germinacion:"⏳ 4–8 días",
tips:"💡 Necesita espacio para extenderse.",
warning:"⚠️ Sin sol no produce frutas dulces."
},

{
id:9,
nombre:"Café ☕",
tipo:"Árbol",
riego:"💧 Regular",
sol:"🌤️ Sombra parcial",
tierra:"🌱 Ácida y rica en materia orgánica",
composta:"♻️ Alta",
germinacion:"⏳ 30–60 días",
tips:"💡 Crece lento pero estable.",
warning:"⚠️ No tolera sol directo fuerte."
}
];

function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "👋 Hola " + nombre + " desde " + ubicacion;
}

function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    let filtro = document.getElementById("busqueda").value.toLowerCase();

    div.innerHTML = "";

    plantas
    .filter(p => p.nombre.toLowerCase().includes(filtro))
    .forEach((p) => {

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p>${p.riego}</p>
            <p>${p.sol}</p>
            <p>${p.tierra}</p>
            <p>${p.composta}</p>
            <p>${p.germinacion}</p>

            <p>💡 ${p.tips}</p>
            <p>⚠️ ${p.warning}</p>

            <button onclick="agregar(${p.id})">
                ➕ Agregar al huerto
            </button>
        </div>
        `;
    });
}

function agregar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    let planta = plantas.find(p => p.id === id);

    huerto.push({
        ...planta,
        fecha: new Date().toLocaleDateString()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function eliminar(nombre){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    huerto = huerto.filter(p => p.nombre !== nombre);

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    div.innerHTML = "";

    huerto.forEach((p) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>${p.riego}</p>
            <p>${p.sol}</p>
            <p>${p.tierra}</p>
            <p>${p.composta}</p>
            <p>${p.germinacion}</p>
            <p>📅 ${p.fecha}</p>

            <button onclick="eliminar('${p.nombre}')">🗑️ Eliminar</button>
        </div>
        `;
    });
}

window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
