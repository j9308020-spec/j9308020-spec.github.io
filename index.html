<html>

<title>🌱 Huerto Inteligente Completo</title>

<style>

.seccion { background:white; padding:10px; margin:10px; border-radius:10px; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }
button { margin-top:5px; cursor:pointer; }
</style>
</head>

<body>

<h1>🌱 Huerto Inteligente México (52 Cultivos + Tiempo real)</h1>

<div class="seccion">
<h2>🌿 Mi Huerto</h2>
<div id="huerto"></div>
</div>

<script>

{ id:39, nombre:"Chile habanero 🌶️", dias:35 },

{ id:41, nombre:"Guayaba 🍈", dias:80 },
{ id:42, nombre:"Tuna 🌵", dias:50 },

// ➕ agregar
function agregar(id){
    let h = JSON.parse(localStorage.getItem("huerto")||"[]");

    h.push({
        ...plantas.find(p=>p.id===id),
        fecha: Date.now()
    });

    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🗑️ eliminar seguro
function eliminar(fecha){
    if(!confirm("⚠️ ¿Seguro que quieres eliminar este cultivo?")) return;

    let h = JSON.parse(localStorage.getItem("huerto")||"[]");
    h = h.filter(p => p.fecha !== fecha);
    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🌱 etapas
function etapa(d, t){
    let r = d/t;
    if(r < 0.25) return "🌱 Semilla";
    if(r < 0.5) return "🌿 Brote";
    if(r < 0.8) return "🌾 Creciendo";
    if(r < 1) return "🌼 Casi listo";
    return "🍅 Listo";
}

// 🌿 mostrar
function mostrarHuerto(){
    let d = document.getElementById("huerto");
    let h = JSON.parse(localStorage.getItem("huerto")||"[]");

    d.innerHTML = "";

    h.forEach(p => {

        let dias = Math.floor((Date.now() - p.fecha)/(1000*60*60*24));

        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p>📅 Plantado: ${new Date(p.fecha).toLocaleDateString()}</p>

            <p>⏳ Días: ${dias}</p>

            <p>🌱 Estado: ${etapa(dias, p.dias)}</p>

            <p>📆 Total estimado: ${p.dias} días</p>

            <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
        </div>
        `;
    });
}

window.onload = mostrarHuerto;

</script>

</body>
</html>
