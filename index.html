// Perfil con localStorage
function guardarPerfil(){
  const nombre = document.getElementById("nombre").value;
  const ubicacion = document.getElementById("ubicacion").value;

  localStorage.setItem("huerto_nombre", nombre);
  localStorage.setItem("huerto_ubicacion", ubicacion);

  mostrarPerfil();
}

function mostrarPerfil(){
  const nombre = localStorage.getItem("huerto_nombre") || "";
  const ubicacion = localStorage.getItem("huerto_ubicacion") || "";

  if(nombre || ubicacion){
    document.getElementById("saludo").innerText =
      `Hola ${nombre}, tu huerto en ${ubicacion} está listo 🌱`;
  }
}

// Catálogo
function mostrarCatalogo(){
  const texto = document.getElementById("busqueda").value.toLowerCase();
  const cont = document.getElementById("catalogo");

  cont.innerHTML = "";

  plantas
    .filter(p => p.nombre.toLowerCase().includes(texto))
    .forEach(p => {
      cont.innerHTML += `
        <div class="cultivo">
          <h3>${p.nombre}</h3>
          <p>Tipo: ${p.tipo}</p>
          <p>Riego: ${p.riego.frecuencia}</p>
          <p>Luz: ${p.luz.horas} hrs</p>
        </div>
      `;
    });
}

// init
window.onload = function(){
  mostrarPerfil();
  mostrarCatalogo();
};
