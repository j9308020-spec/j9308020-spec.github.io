<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto Inteligente FIX FINAL</title>

<style>
body { font-family: Arial; background:#f0f8f5; }
h1 { color: green; }
.cultivo { border:1px solid #ccc; padding:10px; margin:10px; background:white; }
button { margin-top:5px; cursor:pointer; }
small { color:#555; }
</style>
</head>

<body>

<h1>🌱 Huerto Inteligente (FUNCIONANDO)</h1>

<div id="catalogo"></div>
<hr>
<div id="huerto"></div>

<script>

// 🌱 catálogo mínimo funcional (puedes volver a expandirlo después)
const plantas = [
{ id:1, nombre:"Maíz 🌽", dias:10, info:"Base alimenticia de México" },
{ id:2, nombre:"Frijol 🫘", dias:8, info:"Proteína vegetal" },
{ id:3, nombre:"Jitomate 🍅", dias:25, info:"Salsa mexicana" },
{ id:4, nombre:"Lechuga 🥬", dias:12, info:"Crecimiento rápido" },
{ id:5, nombre:"Zanahoria 🥕", dias:20, info:"Raíz dulce" }
];

// ➕ agregar planta
function agregar(id){
    let h = JSON.parse(localStorage.getItem("huerto") || "[]");

    h.push({
        ...plantas.find(p => p.id === id),
        uid: crypto.randomUUID(),
        fecha: Date.now()
    });

    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🗑️ eliminar planta
function eliminar(uid){
    if(!confirm("¿Seguro que quieres eliminar este cultivo?")) return;

    let h = JSON.parse(localStorage.getItem("huerto") || "[]");
    h = h.filter(p => p.uid !== uid);

    localStorage.setItem("huerto", JSON.stringify(h));
    mostrarHuerto();
}

// 🌱 etapas de crecimiento
function etapa(dias, total){
    if(!total) return "❓";

    let r = dias / total;

    if(r < 0.25) return "🌱 Semilla";
    if(r < 0.5) return "🌿 Brote";
    if(r < 0.8) return "🌾 Creciendo";
    if(r < 1) return "🌼 Casi listo";
    return "🍅 Listo";
}

// 📚 mostrar catálogo
function mostrarCatalogo(){
    let d = document.getElementById("catalogo");
    d.innerHTML = "<h2>📚 Catálogo</h2>";

    plantas.forEach(p=>{
        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <small>${p.info}</small><br>
            ⏳ ${p.dias} días aprox<br>
            <button onclick="agregar(${p.id})">➕ Agregar</button>
        </div>
        `;
    });
}

// 🌿 mostrar huerto
function mostrarHuerto(){
    let d = document.getElementById("huerto");
    let h = JSON.parse(localStorage.getItem("huerto") || "[]");

    d.innerHTML = "<h2>🌿 Mi Huerto</h2>";

    h.forEach(p=>{

        let dias = Math.floor((Date.now() - p.fecha) / (1000*60*60*24));
        if(isNaN(dias)) dias = 0;

        d.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <small>${p.info}</small><br><br>

            📅 ${new Date(p.fecha).toLocaleDateString()}<br>
            ⏳ Días: ${dias}<br>
            🌱 Estado: ${etapa(dias, p.dias)}<br>
            📆 Total: ${p.dias} días<br>

            <button onclick="eliminar('${p.uid}')">🗑️ Eliminar</button>
        </div>
        `;
    });

    if(h.length === 0){
        d.innerHTML += "<p>🌱 No tienes cultivos todavía</p>";
    }
}

// iniciar
window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
