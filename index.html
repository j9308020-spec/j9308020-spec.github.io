<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cuidado de Cultivos</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; }
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente</h1>

<div class="seccion">
<h2>Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>Mi Huerto</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">Catálogo de Cultivos</h2>
<div id="catalogo"></div>

<script>

const plantas = [
{
nombre:"Lechuga", riego:"Frecuente", sol:"4–6h", tierra:"Suelta", composta:"Alta", germinacion:"5–10 días"
},
{
nombre:"Zanahoria", riego:"Moderado", sol:"6–8h", tierra:"Profunda", composta:"Media", germinacion:"10–20 días"
},
{
nombre:"Limón", riego:"2–3/sem", sol:"6–8h", tierra:"Drenada", composta:"Alta", germinacion:"10–20 días"
},
{
nombre:"Aguacate", riego:"Moderado", sol:"Sol directo", tierra:"Drenada", composta:"Alta", germinacion:"2–6 semanas"
}
];

function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "Hola " + nombre + " desde " + ubicacion;
}

function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    div.innerHTML = "";

    plantas.forEach((p, index) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>Riego: ${p.riego}</p>
            <p>Sol: ${p.sol}</p>
            <p>Tierra: ${p.tierra}</p>
            <p>Composta: ${p.composta}</p>
            <p>Germinación: ${p.germinacion}</p>

            <button onclick='agregar(${JSON.stringify(p)})'>
                Agregar al huerto
            </button>
        </div>
        `;
    });
}

function agregar(planta){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    huerto.push({
        ...planta,
        fecha: new Date().getDate()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function eliminar(index){
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];
    huerto.splice(index, 1);
    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto")) || [];

    div.innerHTML = "";

    huerto.forEach((p, index) => {
        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>🌞 ${p.sol}</p>
            <p🌱 ${p.tierra}</p>
            <p>♻️ ${p.composta}</p>
            <p>⏳ ${p.germinacion}</p>

            <button onclick="eliminar(${index})">Eliminar</button>
        </div>
        `;
    });
}

window.onload = function(){
    let nombre = localStorage.getItem("nombre");
    let ubicacion = localStorage.getItem("ubicacion");

    if(nombre){
        document.getElementById("saludo").innerText =
        "Hola " + nombre + " desde " + ubicacion;
    }

    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
