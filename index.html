<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>🌱 Huerto con Simulación de Crecimiento</title>

<style>
body { font-family: Arial; background-color: #f0f8f5; }
h1 { color: green; }
.seccion { background: white; padding: 10px; margin: 10px; border-radius: 10px; }
.cultivo { border: 1px solid #ccc; padding: 10px; margin: 10px; background: white; }
button { margin-top: 5px; cursor: pointer; }

.info { font-size: 13px; color: #333; }

.etapa {
    font-weight: bold;
    margin-top: 5px;
}
</style>
</head>

<body>

<h1>🌱 Mi Huerto Inteligente (Crecimiento por Días)</h1>

<div class="seccion">
<h2>👤 Perfil</h2>
<input id="nombre" placeholder="Nombre">
<input id="ubicacion" placeholder="Ubicación">
<button onclick="guardarPerfil()">Guardar</button>
<p id="saludo"></p>
</div>

<div class="seccion">
<h2>🌿 Mi Huerto (vivo)</h2>
<div id="huerto"></div>
</div>

<h2 style="margin-left:10px;">📚 Catálogo</h2>
<div id="catalogo"></div>

<script>

const plantas = [
{ id:1, nombre:"Maíz 🌽", dias:10, info:"Crecimiento rápido en clima cálido." },
{ id:2, nombre:"Frijol 🫘", dias:8, info:"Resistente y rápido." },
{ id:3, nombre:"Jitomate 🍅", dias:25, info:"Necesita soporte al crecer." },
{ id:4, nombre:"Lechuga 🥬", dias:12, info:"Prefiere clima fresco." },
{ id:5, nombre:"Zanahoria 🥕", dias:20, info:"Crecimiento subterráneo lento." }
];

// 🌱 PERFIL
function guardarPerfil(){
    let nombre = document.getElementById("nombre").value;
    let ubicacion = document.getElementById("ubicacion").value;

    localStorage.setItem("nombre", nombre);
    localStorage.setItem("ubicacion", ubicacion);

    document.getElementById("saludo").innerText =
    "👋 Hola " + nombre + " desde " + ubicacion;
}

// 🌿 CATÁLOGO
function mostrarCatalogo(){
    let div = document.getElementById("catalogo");
    div.innerHTML = "";

    plantas.forEach((p) => {

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>
            <p>${p.info}</p>
            <p>⏳ Ciclo: ${p.dias} días</p>

            <button onclick="agregar(${p.id})">
                ➕ Plantar
            </button>
        </div>
        `;
    });
}

// 🌱 AGREGAR PLANTA (con fecha de siembra)
function agregar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    huerto.push({
        ...plantas.find(p => p.id === id),
        fecha: Date.now()
    });

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

// 🗑️ ELIMINAR
function eliminar(id){
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    huerto = huerto.filter(p => p.fecha !== id);

    localStorage.setItem("huerto", JSON.stringify(huerto));
    mostrarHuerto();
}

// 📆 CALCULAR ETAPA DE CRECIMIENTO
function calcularEtapa(diasPasados, diasTotal){

    let progreso = diasPasados / diasTotal;

    if (progreso < 0.25) return "🌱 Semilla";
    if (progreso < 0.5) return "🌿 Brote";
    if (progreso < 0.8) return "🌾 Crecimiento";
    if (progreso < 1) return "🌼 Casi lista";
    return "🍅 Lista para cosecha";
}

// 🌿 MOSTRAR HUERTO
function mostrarHuerto(){
    let div = document.getElementById("huerto");
    let huerto = JSON.parse(localStorage.getItem("huerto") || "[]");

    div.innerHTML = "";

    huerto.forEach((p) => {

        let diasPasados = Math.floor((Date.now() - p.fecha) / (1000 * 60 * 60 * 24));
        let etapa = calcularEtapa(diasPasados, p.dias);

        div.innerHTML += `
        <div class="cultivo">
            <h3>${p.nombre}</h3>

            <p class="info">${p.info}</p>

            <p>📅 Días desde siembra: ${diasPasados}</p>
            <p>⏳ Ciclo total: ${p.dias} días</p>

            <p class="etapa">Estado: ${etapa}</p>

            <button onclick="eliminar(${p.fecha})">🗑️ Eliminar</button>
        </div>
        `;
    });
}

// 🚀 INICIO
window.onload = function(){
    mostrarCatalogo();
    mostrarHuerto();
}

</script>

</body>
</html>
